<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Map Preview</title>
<style>
  body { background: #111; color: #eee; font-family: sans-serif; margin: 0; padding: 16px; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  .grid { display: flex; flex-direction: column; gap: 24px; }
  .item h2 { font-size: 13px; margin: 0 0 6px; color: #aaa; }
  img { display: block; border: 1px solid #333; max-width: 100%; }
</style>
</head>
<body>
<h1>CzechTouristMap — Brno preview</h1>
<div class="grid">
  <div class="item"><h2>zoom 8</h2><img src="/api/render?lat=49.1951&lng=16.6068&zoom=8&width=900&height=500"></div>
  <div class="item"><h2>zoom 10</h2><img src="/api/render?lat=49.1951&lng=16.6068&zoom=10&width=900&height=500"></div>
  <div class="item"><h2>zoom 12</h2><img src="/api/render?lat=49.1951&lng=16.6068&zoom=12&width=900&height=500"></div>
  <div class="item"><h2>zoom 14</h2><img src="/api/render?lat=49.1951&lng=16.6068&zoom=14&width=900&height=500"></div>
  <div class="item"><h2>zoom 16</h2><img src="/api/render?lat=49.1951&lng=16.6068&zoom=16&width=900&height=500"></div>
</div>
</body>
</html>
