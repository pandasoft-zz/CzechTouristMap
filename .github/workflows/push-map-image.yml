name: Push map image

on:
  push:
    branches: [main, master]
    paths:
      - config/map-version.txt
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  push-map:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push map image
        run: bash ./scripts/push-map-image.sh "${{ github.repository_owner }}"
