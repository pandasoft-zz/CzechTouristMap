name: Push HGT image

on:
  push:
    branches: [main, master]
    paths:
      - config/hgt-version.txt
      - docker/hgtdata/Dockerfile
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  push-hgt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          VERSION=$(cat config/hgt-version.txt)
          ORG=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${ORG}/czechtouristmap-hgtdata"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${VERSION}" \
            docker/hgtdata/
