name: Push HGT image

on:
  push:
    branches: [main, master]
    paths:
      - config/hgt-version.txt
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  push-hgt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install GDAL
        run: sudo apt-get install -y gdal-bin

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push HGT image
        run: ./scripts/push-hgt-image.sh "${{ github.repository_owner }}"
