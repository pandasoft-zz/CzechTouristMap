name: Build Theme

on:
  pull_request:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]'

jobs:

  # ── Lint jobs (parallel) ───────────────────────────────────────────────────

  lint-shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: shellcheck build-theme.sh scripts/push-map-image.sh

  lint-yaml:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pip install yamllint --quiet
      - run: yamllint -c .yamllint.yml config/locations.yaml .github/workflows/*.yml

  lint-python:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: pip install ruff --quiet
      - run: ruff check scripts/ tests/

  lint-xml:
    name: xmllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get install -y libxml2-utils --no-install-recommends -q
      - run: xmllint --noout src/styles/CzechTouristMap/*.xslt

  lint-kotlin:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod +x ktlint
      - run: ./ktlint "tile-server/src/**/*.kt"

  # ── Build (depends on all lint jobs) ──────────────────────────────────────

  build:
    name: Build XML
    runs-on: ubuntu-latest
    needs: [lint-shell, lint-yaml, lint-python, lint-xml, lint-kotlin]
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v5

      - name: Compute version
        id: version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            DATE=$(date -u '+%Y.%m.%d')
            PR="${{ github.event.pull_request.number }}"
            echo "version=${DATE}-pr${PR}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build theme XML
        run: ./build-theme.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CzechTouristMap-${{ steps.version.outputs.version }}
          path: themes/CzechTouristMap.xml
          retention-days: 30

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: false,
            });
            const fs = require('fs');
            const xml = fs.readFileSync('themes/CzechTouristMap.xml');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'CzechTouristMap.xml',
              data: xml,
            });
            core.info(`Release created: ${release.html_url}`);
