name: Lint

on:
  push:
  pull_request:

jobs:

  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck build-theme.sh scripts/push-map-image.sh

  yaml:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint --quiet
      - run: yamllint -c .yamllint.yml config/locations.yaml .github/workflows/*.yml

  python:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ruff --quiet
      - run: ruff check scripts/ tests/

  xml:
    name: xmllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y libxml2-utils --no-install-recommends -q
      - run: xmllint --noout src/styles/CzechTouristMap/*.xslt

  kotlin:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod +x ktlint
      - run: ./ktlint "tile-server/src/**/*.kt"
