services:

  # Copies the map file from the GHCR image into the map-data volume.
  # Runs once on first start; skips copy if file already exists.
  # Re-run manually after updating the map image:
  #   docker compose run --rm map-init
  map-init:
    image: ghcr.io/pandasoft-zz/czechtouristmap-mapdata:latest
    volumes:
      - map-data:/export
    restart: "no"

  tile-server:
    build: ./tile-server
    container_name: maprender-tile-server
    depends_on:
      map-init:
        condition: service_completed_successfully
    environment:
      MAP_FILE: /data/maps/czech-republic.map
      THEMES_DIR: /data/themes
      LOCATIONS_FILE: /data/config/locations.yaml
    volumes:
      - map-data:/data/maps:ro
      - ./themes:/data/themes:ro
      - ./config:/data/config
    ports:
      - "8080:8080"       # optional: direct access for debugging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s   # Gradle build + JVM startup takes a moment

  web:
    build: ./web
    container_name: maprender-web
    ports:
      - "80:80"
    depends_on:
      tile-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  map-data:
