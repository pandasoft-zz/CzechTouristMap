services:

  theme-builder:
    build: ./theme-builder
    container_name: maprender-theme-builder
    environment:
      STYLE: CzechTouristMap
    volumes:
      - ./src/styles:/app/styles:ro
      - ./theme-builder/server.py:/app/server.py:ro
      - ./themes:/data/themes:rw
    restart: unless-stopped

  tile-server:
    build: ./tile-server
    container_name: maprender-tile-server
    environment:
      MAP_FILE: /data/maps/czech-republic.map
      THEMES_DIR: /data/themes
      LOCATIONS_FILE: /data/config/locations.yaml
      HGT_DIR: /data/hgt
      THEME_BUILDER_URL: http://theme-builder:5000
    depends_on:
      - theme-builder
    volumes:
      - type: image
        source: ghcr.io/pandasoft-zz/czechtouristmap-mapdata:latest
        target: /data/maps
        read_only: true
      - ./themes:/data/themes:ro
      - ./config:/data/config
      - type: image
        source: ghcr.io/pandasoft-zz/czechtouristmap-hgtdata:latest
        target: /data/hgt
        read_only: true
    ports:
      - "8080:8080"       # optional: direct access for debugging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s   # Gradle build + JVM startup takes a moment

  web:
    build: ./web
    container_name: maprender-web
    ports:
      - "80:80"
    depends_on:
      tile-server:
        condition: service_healthy
    restart: unless-stopped
